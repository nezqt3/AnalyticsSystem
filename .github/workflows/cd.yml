name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

jobs:
  deploy:
    name: Deploy To Server
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Ensure deploy directory exists
        env:
          SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}'"

      - name: Sync project to server
        env:
          SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          sshpass -e rsync -az --delete \
            --exclude .git \
            --exclude .env \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Build server env file
        run: |
          cat > .deploy.env <<EOF
          PORT=8080
          DATABASE_URL=postgres://analytics:analytics@db:5432/analytics?sslmode=disable
          RAW_RETENTION_DAYS=30
          AGG_RETENTION_MONTHS=12
          HEATMAP_BUCKET_PCT=5
          EVENTS_LIMIT=200
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          SESSION_SECRET=${{ secrets.SESSION_SECRET }}
          VITE_API_BASE=${{ secrets.VITE_API_BASE }}
          VITE_SITE_ID=${{ secrets.VITE_SITE_ID }}
          EOF

      - name: Upload server env file
        env:
          SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          sshpass -e scp -o StrictHostKeyChecking=no .deploy.env \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/.env"

      - name: Deploy containers
        env:
          SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "
            cd '${{ secrets.DEPLOY_PATH }}' &&
            docker compose up -d --build --remove-orphans
          "
