services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      POSTGRES_DB: analytics
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "9001:5432"

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://analytics:analytics@db:5432/analytics?sslmode=disable
      RAW_RETENTION_DAYS: 30
      AGG_RETENTION_MONTHS: 12
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      SESSION_SECRET: ${SESSION_SECRET:-replace-with-a-long-random-secret}
    depends_on:
      - db
    ports:
      - "9081:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8080}
        VITE_SITE_ID: ${VITE_SITE_ID:-1}
    depends_on:
      - backend
    ports:
      - "9090:80"
    restart: unless-stopped

volumes:
  pgdata:
